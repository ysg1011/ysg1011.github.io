<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <title>笔记博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 允许文本内容被选择 */
        .markdown-body {
            -webkit-user-select: text;
            user-select: text;
        }
        .header {
            background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: headerGradient 3s ease infinite;
        }
        @keyframes headerGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.8rem;
        }
        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #30363d;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        /* 设置按钮和面板 */
        .settings-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #30363d;
            border: none;
            color: #8b949e;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .settings-btn:hover { color: #c9d1d9; }
        .settings-panel {
            display: none;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 16px;
        }
        .settings-panel.show { display: block; }
        .settings-panel label { color: #c9d1d9; font-size: 13px; }
        .settings-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .settings-row input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .settings-row input:focus { border-color: #58a6ff; }
        .settings-row button {
            background: #238636;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .settings-row button:hover { background: #2ea043; }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        /* 左侧文件列表 */
        .sidebar {
            width: 250px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 16px;
            padding-bottom: 32px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 100;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .sidebar-title {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-close {
            display: none;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }
        .sidebar-close:hover { color: #c9d1d9; background: #30363d; }

        /* 文件目录 */
        .tree-icon { flex-shrink: 0; font-size: 14px; }
        .tree-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-count {
            font-size: 11px;
            color: #8b949e;
            background: #21262d;
            padding: 0 6px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .tree-leaf {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            min-height: 32px;
        }
        .tree-leaf:hover { background: #30363d; }
        .tree-leaf.active { background: #1f6feb; color: white; }
        .tree-leaf .tree-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .dir-parent { color: #8b949e; font-style: italic; }
        .dir-parent:hover { color: #c9d1d9; }
        .dir-folder { color: #58a6ff; font-weight: 500; }
        .dir-folder:hover { color: #79c0ff; }
        /* 右侧内容 */
        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .file-title {
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .loading { color: #8b949e; }
        .error { color: #f85149; }

        /* 代码样式 */
        pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            color: #e6edf3;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'SF Mono', Consolas, monospace;
        }
        code {
            font-family: 'SF Mono', Consolas, monospace;
        }

        /* Markdown 渲染样式 */
        .markdown-body {
            color: #c9d1d9;
            line-height: 1.8;
            font-size: 15px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .markdown-body > p {
            margin: 12px 0;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: #f0f6fc;
            margin: 28px 0 12px;
            font-weight: 600;
            line-height: 1.4;
        }
        .markdown-body h1 { font-size: 1.7em; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .markdown-body h2 { font-size: 1.4em; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
        .markdown-body h3 { font-size: 1.2em; }
        .markdown-body h4 { font-size: 1.05em; }
        .markdown-body > h1:first-child,
        .markdown-body > h2:first-child,
        .markdown-body > h3:first-child {
            margin-top: 0;
        }
        .markdown-body a {
            color: #58a6ff;
            text-decoration: none;
            word-break: break-all;
        }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol { margin: 10px 0; padding-left: 24px; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body li > ul, .markdown-body li > ol { margin: 4px 0; }
        .markdown-body blockquote {
            border-left: 4px solid #238636;
            padding: 10px 16px;
            margin: 14px 0;
            color: #8b949e;
            background: rgba(35, 134, 54, 0.1);
            border-radius: 0 6px 6px 0;
        }
        .markdown-body blockquote p { margin: 0; }
        .markdown-body table {
            border-collapse: collapse;
            margin: 14px 0;
            display: block;
            overflow-x: auto;
            max-width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #30363d;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: #161b22;
            color: #f0f6fc;
            font-weight: 600;
        }
        .markdown-body tr:nth-child(even) { background: rgba(22, 27, 34, 0.5); }
        .markdown-body hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 20px 0;
        }
        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
            margin: 10px 0;
        }
        .markdown-body strong { color: #f0f6fc; font-weight: 600; }
        .markdown-body em { color: #c9d1d9; }
        .markdown-body code {
            background: rgba(110, 118, 129, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'SF Mono', Consolas, monospace;
            word-break: break-all;
        }
        .markdown-body pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 14px;
            overflow-x: auto;
            margin: 14px 0;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
            word-break: normal;
        }

        /* 代码高亮 */
        .hljs-keyword { color: #ff7b72; }
        .hljs-string { color: #a5d6ff; }
        .hljs-number { color: #79c0ff; }
        .hljs-comment { color: #8b949e; font-style: italic; }
        .hljs-function { color: #d2a8ff; }
        .hljs-title { color: #d2a8ff; }
        .hljs-params { color: #e6edf3; }
        .hljs-built_in { color: #ffa657; }
        .hljs-literal { color: #79c0ff; }
        .hljs-type { color: #ffa657; }
        .hljs-attr { color: #79c0ff; }
        .hljs-selector-tag { color: #7ee787; }
        .hljs-selector-class { color: #d2a8ff; }
        .hljs-selector-id { color: #79c0ff; }

        /* 图片显示 */
        .image-viewer {
            text-align: center;
        }
        .image-viewer img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* 内容大纲 TOC */
        .toc-panel {
            padding: 0;
        }
        .toc-title {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding: 0 8px;
        }
        .toc-back {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
            justify-content: center;
        }
        .toc-back:hover { color: #c9d1d9; border-color: #58a6ff; }
        .toc-item {
            display: block;
            padding: 4px 8px 4px 12px;
            color: #8b949e;
            font-size: 13px;
            text-decoration: none;
            border-left: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border-radius: 0 4px 4px 0;
            line-height: 1.5;
        }
        .toc-item:hover {
            color: #c9d1d9;
            background: #21262d;
        }
        .toc-item.active {
            color: #58a6ff;
            border-left-color: #58a6ff;
            background: rgba(88, 166, 255, 0.08);
        }
        .toc-item[data-level="1"] { padding-left: 12px; font-weight: 600; color: #c9d1d9; }
        .toc-item[data-level="2"] { padding-left: 24px; }
        .toc-item[data-level="3"] { padding-left: 36px; font-size: 12px; }
        .toc-item[data-level="4"] { padding-left: 48px; font-size: 12px; color: #6e7681; }
        .toc-item[data-level="5"] { padding-left: 60px; font-size: 11px; color: #6e7681; }
        .toc-item[data-level="6"] { padding-left: 72px; font-size: 11px; color: #484f58; }

        /* Markdown 主内容优化 */
        .main {
            scroll-behavior: smooth;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            scroll-margin-top: 20px;
        }
        .markdown-body h1:target, .markdown-body h2:target, .markdown-body h3:target,
        .markdown-body h4:target, .markdown-body h5:target, .markdown-body h6:target {
            background: rgba(88, 166, 255, 0.1);
            border-radius: 4px;
            padding-left: 8px;
            margin-left: -8px;
        }

        /* 响应式 - 平板及以下 */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .header {
                padding: 0.8rem 0.8rem 0.8rem 3rem;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 101;
                height: 60px;
            }
            .container {
                flex-direction: column;
                padding-top: 60px; /* 给固定header留出空间 */
                min-height: 100vh;
            }
            .sidebar {
                position: fixed;
                top: 60px;
                left: 0;
                bottom: 0;
                width: 260px;
                transform: translateX(-100%);
                padding: 12px 12px 48px;
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-overlay.show {
                display: block;
            }
            .main {
                padding: 12px;
                margin-top: 0;
            }
            .markdown-body {
                font-size: 14px;
            }
            .markdown-body h1 { font-size: 1.4em; }
            .markdown-body h2 { font-size: 1.25em; }
            .markdown-body h3 { font-size: 1.1em; }
            pre {
                padding: 12px;
                font-size: 12px;
            }
            .markdown-body table {
                font-size: 12px;
                display: table;
                width: auto;
                min-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .markdown-body th, .markdown-body td {
                padding: 6px 8px;
                white-space: nowrap;
            }
            .tree-leaf {
                font-size: 13px;
                padding: 5px 6px;
                min-height: 36px;
            }
            .tree-label { font-size: 13px; }
            .tree-count { font-size: 10px; padding: 0 5px; }
            .sidebar-title { font-size: 11px; margin-bottom: 8px; position: sticky; top: 0; background: #161b22; z-index: 1; padding-top: 4px; padding-bottom: 8px; }
            .sidebar { touch-action: pan-y; }
            .sidebar-close { display: block; }
            .toc-item { font-size: 12px; padding: 5px 8px 5px 10px; }
            .toc-item[data-level="2"] { padding-left: 20px; }
            .toc-item[data-level="3"] { padding-left: 30px; }
            .toc-item[data-level="4"] { padding-left: 40px; }
            .toc-item[data-level="5"] { padding-left: 50px; }
            .toc-item[data-level="6"] { padding-left: 60px; }
        }

        /* 响应式 - 手机 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1rem;
                margin-bottom: 0.2rem;
            }
            .header p {
                font-size: 0.7rem;
            }
            .menu-toggle {
                left: 0.5rem;
                padding: 6px 8px;
                font-size: 1rem;
            }
            .settings-btn {
                right: 0.5rem;
                padding: 6px 8px;
                font-size: 1rem;
            }
            .header {
                padding: 0.6rem 0.6rem 0.6rem 2.5rem;
                height: 55px;
            }
            .container {
                padding-top: 55px;
            }
            .sidebar {
                top: 55px;
                width: 85%;
                max-width: 280px;
            }
            .sidebar-title {
                font-size: 11px;
                margin-bottom: 8px;
                padding: 0 4px;
            }
            .main {
                padding: 8px;
            }
            .file-title {
                font-size: 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                margin-bottom: 8px;
            }
            .markdown-body {
                font-size: 14px;
                line-height: 1.6;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }
            .markdown-body > p {
                margin: 10px 0;
                word-break: break-word;
            }
            .markdown-body h1, .markdown-body h2, .markdown-body h3 {
                margin: 16px 0 8px;
                word-break: break-word;
            }
            .markdown-body h1 {
                font-size: 1.3em;
                line-height: 1.3;
            }
            .markdown-body h2 {
                font-size: 1.2em;
                line-height: 1.3;
            }
            .markdown-body h3 {
                font-size: 1.1em;
                line-height: 1.3;
            }
            .markdown-body ul, .markdown-body ol {
                padding-left: 16px;
                margin: 8px 0;
            }
            .markdown-body li {
                margin: 4px 0;
            }
            .markdown-body blockquote {
                padding: 6px 10px;
                margin: 12px 0;
            }
            .markdown-body code {
                font-size: 0.85em;
                word-break: break-all;
            }
            pre {
                padding: 8px;
                font-size: 11px;
                border-radius: 4px;
                overflow-x: auto;
            }
            .tree-leaf {
                font-size: 12px;
                padding: 4px 4px;
                min-height: 36px;
            }
            .tree-leaf .tree-label {
                word-break: break-all;
            }
            .tree-count {
                font-size: 10px;
                padding: 0 4px;
            }
            .markdown-body table {
                font-size: 11px;
            }
            .markdown-body th, .markdown-body td {
                padding: 4px 6px;
                word-break: break-word;
            }
        }

        /* 响应式 - 极小的手机屏幕 */
        @media (max-width: 360px) {
            .header h1 {
                font-size: 0.9rem;
            }
            .header p {
                font-size: 0.65rem;
            }
            .markdown-body {
                font-size: 13px;
            }
            .markdown-body h1 { font-size: 1.2em; }
            .markdown-body h2 { font-size: 1.1em; }
            .markdown-body h3 { font-size: 1em; }
            pre {
                font-size: 10px;
                padding: 6px;
            }
            .tree-leaf {
                font-size: 12px;
                padding: 4px 4px;
                min-height: 32px;
            }
            .tree-label { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="打开菜单">☰</button>
        <h1>📝 我的笔记</h1>
        <p>记录思考，分享生活</p>
        <button class="settings-btn" onclick="toggleSettings()" title="设置 Token" aria-label="设置">⚙</button>
    </div>
    <div class="menu-overlay" onclick="toggleSidebar()"></div>
    <div class="settings-panel" id="settings-panel">
        <label>GitHub Token <span style="opacity:0.5">(解决 API 限流)</span></label>
        <div class="settings-row">
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="saveToken()">保存</button>
        </div>
        <div id="token-status" style="font-size:12px;margin-top:6px;opacity:0.7"></div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar" role="navigation" aria-label="文件目录">
            <div class="sidebar-title">
                <span id="sidebar-title-text">文件目录</span>
                <button class="sidebar-close" onclick="toggleSidebar()" title="关闭" aria-label="关闭菜单">✕</button>
            </div>
            <div id="file-list"></div>
            <div id="toc-panel" class="toc-panel" style="display:none"></div>
        </div>
        <div class="main">
            <div id="file-content"></div>
        </div>
    </div>

    <script>
        // 配置仓库信息
        const REPO = 'ysg1011/ysg1011.github.io';
        const BRANCH = 'main';

        // 需要排除的文件/目录
        const EXCLUDE_PATTERNS = [
            'index.html', 'README.md', 'LICENSE',
            '.git', '.github', 'CNAME', '_config.yml', 'Gemfile',
            'images'
        ];

        let FILES = [];
        let currentPath = '';
        const icons = ['📄', '📝', '📋', '📑', '📃', '🗎'];

        // GitHub Token 管理
        function getToken() { return localStorage.getItem('gh_token') || ''; }
        function setToken(t) { localStorage.setItem('gh_token', t); }

        function ghHeaders() {
            const h = { 'Accept': 'application/vnd.github.v3+json' };
            const t = getToken();
            if (t) h['Authorization'] = 'token ' + t;
            return h;
        }

        // 判断是否为排除项
        function isExcluded(path) {
            return EXCLUDE_PATTERNS.some(ex =>
                path === ex || path.startsWith(ex + '/')
            );
        }

        // 方案1: 用 Trees API 获取全部文件（需 token 解决限流）
        async function fetchViaTreesAPI() {
            const url = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;
            const res = await fetch(url, { headers: ghHeaders() });
            if (!res.ok) throw new Error('Trees API 失败: ' + res.status);
            const data = await res.json();
            return data.tree
                .filter(item => item.type === 'blob' && !isExcluded(item.path))
                .map(item => ({ repo: REPO, path: item.path }));
        }

        // 方案2: 递归 Contents API（每层单独请求）
        async function fetchViaContentsAPI(path) {
            const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
            const res = await fetch(url, { headers: ghHeaders() });
            if (!res.ok) throw new Error('Contents API 失败: ' + res.status);
            const items = await res.json();
            let files = [];
            for (const item of items) {
                if (isExcluded(item.path)) continue;
                if (item.type === 'file') {
                    files.push({ repo: REPO, path: item.path });
                } else if (item.type === 'dir') {
                    const sub = await fetchViaContentsAPI(item.path);
                    files = files.concat(sub);
                }
            }
            return files;
        }

        // 主获取函数：先 Trees API，失败回退 Contents API
        async function fetchAllFiles() {
            try {
                return await fetchViaTreesAPI();
            } catch (e) {
                console.warn('Trees API 失败，回退到 Contents API:', e);
                return await fetchViaContentsAPI('');
            }
        }

        // 获取文件类型
        function getFileType(path) {
            const ext = path.split('.').pop().toLowerCase();
            const name = path.split('/').pop().toLowerCase();
            const codeFiles = ['makefile', 'dockerfile', 'rakefile', 'gemfile', 'procfile', 'cmakelists.txt'];

            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'].includes(ext)) return 'image';
            if (ext === 'md') return 'markdown';
            if (codeFiles.includes(name)) return 'code';
            if (['c', 'h', 'cpp', 'hpp', 'py', 'js', 'ts', 'go', 'rs', 'java', 'kt', 'sh', 'bash', 'makefile', 'mk'].includes(ext)) return 'code';
            return 'text';
        }

        // 获取代码语言
        function getCodeLanguage(path) {
            const ext = path.split('.').pop().toLowerCase();
            const name = path.split('/').pop().toLowerCase();
            const nameMap = {
                'makefile': 'makefile', 'dockerfile': 'dockerfile',
                'rakefile': 'ruby', 'gemfile': 'ruby', 'cmakelists.txt': 'cmake'
            };
            if (nameMap[name]) return nameMap[name];
            const map = {
                'c': 'c', 'h': 'c', 'cpp': 'cpp', 'hpp': 'cpp',
                'py': 'python', 'js': 'javascript', 'ts': 'typescript',
                'go': 'go', 'rs': 'rust', 'java': 'java', 'kt': 'kotlin',
                'sh': 'bash', 'bash': 'bash', 'makefile': 'makefile', 'mk': 'makefile'
            };
            return map[ext] || 'text';
        }

        // 简单 Markdown 转 HTML
        function parseMarkdown(text) {
            const lines = text.split('\n');
            let html = '';
            let inCodeBlock = false;
            let inTable = false;
            let inList = false;
            let isOrderedList = false;
            let inBlockquote = false;
            let codeBlockContent = '';
            let codeBlockLang = '';
            let tableRows = [];
            let listItems = [];
            let blockquoteContent = [];
            let headings = [];
            let i = 0;

            while (i < lines.length) {
                const line = lines[i];
                const trimmed = line.trim();

                // 代码块开始
                if (trimmed.startsWith('```')) {
                    if (!inCodeBlock) {
                        inCodeBlock = true;
                        codeBlockLang = trimmed.slice(3).trim();
                        codeBlockContent = '';
                    } else {
                        // 代码块结束
                        inCodeBlock = false;
                        html += `<pre><code class="language-${codeBlockLang}">${escapeHtml(codeBlockContent)}</code></pre>`;
                    }
                    i++;
                    continue;
                }

                if (inCodeBlock) {
                    codeBlockContent += (codeBlockContent ? '\n' : '') + line;
                    i++;
                    continue;
                }

                // 引用块
                if (trimmed.startsWith('>')) {
                    blockquoteContent.push(trimmed.slice(1).trim());
                    inBlockquote = true;
                    i++;
                    continue;
                } else if (inBlockquote) {
                    html += `<blockquote>${applyInlineFormatting(blockquoteContent.join('<br>'))}</blockquote>`;
                    blockquoteContent = [];
                    inBlockquote = false;
                    continue;
                }

                // 表格
                if (trimmed.startsWith('|') && !trimmed.includes('---')) {
                    if (!inTable) {
                        inTable = true;
                        tableRows = [];
                    }
                    const cells = trimmed.split('|').filter(c => c.trim());
                    tableRows.push(cells.map(c => c.trim()));
                    i++;
                    continue;
                } else if (trimmed.includes('---') && trimmed.includes('|')) {
                    // 表格分隔行，跳过
                    i++;
                    continue;
                } else if (inTable) {
                    // 表格结束，生成 HTML
                    if (tableRows.length > 0) {
                        html += '<table><thead><tr>';
                        tableRows[0].forEach(h => html += `<th>${applyInlineFormatting(h)}</th>`);
                        html += '</tr></thead><tbody>';
                        for (let j = 1; j < tableRows.length; j++) {
                            html += '<tr>';
                            tableRows[j].forEach(c => html += `<td>${applyInlineFormatting(c)}</td>`);
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                    }
                    tableRows = [];
                    inTable = false;
                    continue;
                }

                // 无序列表
                if (trimmed.startsWith('- ')) {
                    if (!inList) {
                        inList = true;
                        isOrderedList = false;
                        listItems = [];
                    }
                    listItems.push(trimmed.slice(2));
                    i++;
                    continue;
                }
                // 有序列表
                else if (/^\d+\.\s/.test(trimmed)) {
                    if (!inList) {
                        inList = true;
                        isOrderedList = true;
                        listItems = [];
                    }
                    listItems.push(trimmed.replace(/^\d+\.\s/, ''));
                    i++;
                    continue;
                }
                else if (inList) {
                    // 列表结束
                    const tag = isOrderedList ? 'ol' : 'ul';
                    html += `<${tag}>` + listItems.map(item => `<li>${applyInlineFormatting(item)}</li>`).join('') + `</${tag}>`;
                    listItems = [];
                    inList = false;
                    continue;
                }

                // 水平线
                if (/^---+$/.test(trimmed)) {
                    html += '<hr>';
                    i++;
                    continue;
                }

                // 标题（从长到短匹配，避免 #### 被 ### 截获）
                if (trimmed.startsWith('###### ')) {
                    const text = trimmed.slice(7);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 6, text, id });
                    html += `<h6 id="${id}">${escapeHtml(text)}</h6>`;
                } else if (trimmed.startsWith('##### ')) {
                    const text = trimmed.slice(6);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 5, text, id });
                    html += `<h5 id="${id}">${escapeHtml(text)}</h5>`;
                } else if (trimmed.startsWith('#### ')) {
                    const text = trimmed.slice(5);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 4, text, id });
                    html += `<h4 id="${id}">${escapeHtml(text)}</h4>`;
                } else if (trimmed.startsWith('### ')) {
                    const text = trimmed.slice(4);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 3, text, id });
                    html += `<h3 id="${id}">${escapeHtml(text)}</h3>`;
                } else if (trimmed.startsWith('## ')) {
                    const text = trimmed.slice(3);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 2, text, id });
                    html += `<h2 id="${id}">${escapeHtml(text)}</h2>`;
                } else if (trimmed.startsWith('# ')) {
                    const text = trimmed.slice(2);
                    const id = text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');
                    headings.push({ level: 1, text, id });
                    html += `<h1 id="${id}">${escapeHtml(text)}</h1>`;
                } else if (trimmed) {
                    // 普通段落 - 处理行内格式
                    let p = applyInlineFormatting(line);

                    if (p.trim()) {
                        html += `<p>${p}</p>`;
                    }
                }

                i++;
            }

            // 处理剩余内容
            if (inTable && tableRows.length > 0) {
                html += '<table><thead><tr>';
                tableRows[0].forEach(h => html += `<th>${applyInlineFormatting(h)}</th>`);
                html += '</tr></thead><tbody>';
                for (let j = 1; j < tableRows.length; j++) {
                    html += '<tr>';
                    tableRows[j].forEach(c => html += `<td>${applyInlineFormatting(c)}</td>`);
                    html += '</tr>';
                }
                html += '</tbody></table>';
            }

            if (inList && listItems.length > 0) {
                const tag = isOrderedList ? 'ol' : 'ul';
                html += `<${tag}>` + listItems.map(item => `<li>${item}</li>`).join('') + `</${tag}>`;
            }

            if (inBlockquote && blockquoteContent.length > 0) {
                html += `<blockquote>${applyInlineFormatting(blockquoteContent.join('<br>'))}</blockquote>`;
            }

            return {
                html: `<div class="markdown-body">${html}</div>`,
                headings
            };
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        // 行内格式处理（供段落、引用、表格单元格共用）
        function applyInlineFormatting(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/__([^_]+)__/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/_([^_]+)_/g, '<em>$1</em>')
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
                    if (/^javascript:/i.test(url)) return label;
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
                });
        }

        // 简单语法高亮
        function highlightCode(code, language) {
            const keywords = {
                c: ['int', 'void', 'char', 'float', 'double', 'if', 'else', 'for', 'while', 'return', 'struct', 'enum', 'typedef', 'static', 'const', 'unsigned', 'long', 'short', 'case', 'switch', 'break', 'continue', 'default', 'do', 'goto', 'sizeof', 'union', 'volatile', 'extern', 'register', 'signed'],
                python: ['def', 'class', 'if', 'elif', 'else', 'for', 'while', 'return', 'import', 'from', 'as', 'try', 'except', 'finally', 'with', 'pass', 'break', 'continue', 'lambda', 'yield', 'global', 'nonlocal', 'raise', 'assert', 'del', 'in', 'is', 'not', 'and', 'or', 'True', 'False', 'None'],
                javascript: ['function', 'var', 'let', 'const', 'if', 'else', 'for', 'while', 'return', 'class', 'extends', 'new', 'this', 'import', 'export', 'default', 'try', 'catch', 'finally', 'throw', 'async', 'await', 'true', 'false', 'null', 'undefined'],
                go: ['func', 'package', 'import', 'var', 'const', 'type', 'struct', 'interface', 'if', 'else', 'for', 'range', 'return', 'go', 'chan', 'select', 'defer', 'true', 'false', 'nil'],
                rust: ['fn', 'let', 'mut', 'const', 'static', 'if', 'else', 'match', 'for', 'while', 'loop', 'return', 'struct', 'enum', 'impl', 'trait', 'pub', 'use', 'mod', 'crate', 'self', 'super', 'true', 'false'],
                bash: ['if', 'then', 'else', 'elif', 'fi', 'for', 'do', 'done', 'while', 'case', 'esac', 'function', 'return', 'echo', 'export', 'source', 'cd', 'ls', 'mkdir', 'rm', 'cp', 'mv', 'cat', 'grep', 'sed', 'awk']
            };

            let highlighted = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 字符串
            highlighted = highlighted.replace(/(["'`])(?:(?!\1)[^\\]|\\.)*\1/g, '<span class="hljs-string">$&</span>');

            // 注释
            highlighted = highlighted.replace(/(\/\/.*$)/gm, '<span class="hljs-comment">$1</span>');
            highlighted = highlighted.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hljs-comment">$1</span>');
            highlighted = highlighted.replace(/(#.*$)/gm, '<span class="hljs-comment">$1</span>');

            // 数字
            highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, '<span class="hljs-number">$1</span>');

            // 关键字
            if (keywords[language]) {
                const kw = keywords[language].join('|');
                highlighted = highlighted.replace(new RegExp(`\\b(${kw})\\b`, 'g'), '<span class="hljs-keyword">$1</span>');
            }

            return highlighted;
        }

        // 根据文件名获取图标
        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const base = name.toLowerCase();
            if (ext === 'md') return '📝';
            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'].includes(ext)) return '🖼';
            if (['makefile', 'dockerfile', 'rakefile', 'gemfile', 'cmakelists.txt'].includes(base)) return '💻';
            if (['c', 'h', 'cpp', 'hpp', 'py', 'js', 'ts', 'go', 'rs', 'java', 'kt'].includes(ext)) return '💻';
            if (['sh', 'bash'].includes(ext)) return '⚙';
            return '📄';
        }

        // 进入子目录
        function navigateTo(folderName) {
            currentPath = currentPath ? currentPath + '/' + folderName : folderName;
            renderFileList();
        }

        // 返回上一级
        function navigateUp() {
            const parts = currentPath.split('/');
            parts.pop();
            currentPath = parts.join('/');
            renderFileList();
        }

        // 渲染左侧文件列表（层级浏览模式）
        function renderFileList() {
            const list = document.getElementById('file-list');
            let html = '';

            // 返回上一级
            if (currentPath) {
                html += `<div class="tree-leaf dir-parent" onclick="navigateUp()">`;
                html += `<span class="tree-icon"> </span>`;
                html += `<span class="tree-label">..  返回上一级</span>`;
                html += `</div>`;
            }

            // 收集当前目录下的文件夹和文件
            const prefix = currentPath ? currentPath + '/' : '';
            const folders = new Map();
            const files = [];

            for (let i = 0; i < FILES.length; i++) {
                const path = FILES[i].path;
                if (!path.startsWith(prefix)) continue;
                const rest = path.slice(prefix.length);
                const slashIdx = rest.indexOf('/');

                if (slashIdx !== -1) {
                    const folderName = rest.slice(0, slashIdx);
                    if (!folders.has(folderName)) {
                        folders.set(folderName, 0);
                    }
                    folders.set(folderName, folders.get(folderName) + 1);
                } else {
                    files.push({ name: rest, index: i });
                }
            }

            // 渲染文件夹（排在前面）
            for (const [name, count] of [...folders.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
                const escaped = escapeHtml(name).replace(/'/g, '&#39;');
                html += `<div class="tree-leaf dir-folder" onclick="navigateTo('${escaped}')">`;
                html += `<span class="tree-icon"> </span>`;
                html += `<span class="tree-label">${escapeHtml(name)}/</span>`;
                html += `<span class="tree-count">${count}</span>`;
                html += `</div>`;
            }

            // 渲染文件
            for (const { name, index } of files) {
                const icon = getFileIcon(name);
                html += `<div class="tree-leaf" data-index="${index}">`;
                html += `<span class="tree-icon">${icon}</span>`;
                html += `<span class="tree-label">${escapeHtml(name)}</span>`;
                html += `</div>`;
            }

            list.innerHTML = html;

            // 绑定文件点击事件
            list.querySelectorAll('.tree-leaf[data-index]').forEach(el => {
                el.addEventListener('click', function() {
                    debouncedShowFile(parseInt(this.dataset.index));
                });
            });

            // 更新侧边栏标题
            const titleText = document.getElementById('sidebar-title-text');
            titleText.textContent = currentPath || '文件目录';
        }

        // 移动端侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.menu-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');

            // 阻止body滚动
            if (sidebar.classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        // 点击文件后自动关闭侧边栏（移动端）- 包装 showFile
        const originalShowFile = showFile;
        window.showFile = async function(index) {
            await originalShowFile(index);
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        };

        // 触摸滑动关闭侧边栏
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const sidebar = document.getElementById('sidebar');
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            // 只处理水平滑动（忽略垂直滚动）
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                // 侧边栏打开时向右滑动关闭
                if (sidebar.classList.contains('open') && dx > 50) {
                    toggleSidebar();
                }
                // 侧边栏关闭时从屏幕左边缘向右滑动打开
                else if (!sidebar.classList.contains('open') && dx > 50 && touchStartX < 30) {
                    toggleSidebar();
                }
            }
        });

        // 点击遮罩层关闭侧边栏
        document.querySelector('.menu-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                toggleSidebar();
            }
        });

        // 点击侧边栏空白区域关闭侧边栏
        document.getElementById('sidebar').addEventListener('click', function(e) {
            if (e.target === this || e.target === document.getElementById('file-list')) {
                toggleSidebar();
            }
        });

        // 点击正文区域关闭侧边栏
        document.querySelector('.main').addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {

        // 显示指定文件
        async function showFile(index) {
            // 更新选中状态
            document.querySelectorAll('.tree-leaf').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.index) === index);
            });

            const file = FILES[index];
            const container = document.getElementById('file-content');
            const icon = icons[index % icons.length];
            const fileType = getFileType(file.path);

            container.innerHTML = `
                <div class="file-title">
                    <span class="file-icon">${icon}</span>
                    ${file.path}
                </div>
                <div class="loading">加载中...</div>
            `;

            try {
                const url = `https://raw.githubusercontent.com/${file.repo}/main/${file.path}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('文件不存在');

                const content = await res.text();

                // 非 md 文件恢复文件树
                const fileList = document.getElementById('file-list');
                const tocPanel = document.getElementById('toc-panel');
                const titleText = document.getElementById('sidebar-title-text');

                if (fileType === 'image') {
                    fileList.style.display = '';
                    tocPanel.style.display = 'none';
                    titleText.textContent = '文件目录';
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <div class="image-viewer">
                            <img src="${url}" alt="${file.path}" onerror="this.parentElement.innerHTML='<p class=error>图片加载失败</p>'">
                        </div>
                    `;
                } else if (fileType === 'markdown') {
                    const { html, headings } = parseMarkdown(content);
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        ${html}
                    `;
                    // 渲染 TOC
                    if (headings.length > 0) {
                        titleText.textContent = '内容大纲';
                        fileList.style.display = 'none';
                        tocPanel.style.display = '';
                        let tocHtml = `<button class="toc-back" onclick="restoreFileList()">← 返回文件目录</button>`;
                        tocHtml += `<div class="toc-title">内容大纲</div>`;
                        headings.forEach(h => {
                            tocHtml += `<a class="toc-item" data-level="${h.level}" data-id="${h.id}" onclick="scrollToHeading('${h.id}')">${escapeHtml(h.text)}</a>`;
                        });
                        tocPanel.innerHTML = tocHtml;
                        setupScrollSpy();
                    } else {
                        fileList.style.display = '';
                        tocPanel.style.display = 'none';
                        titleText.textContent = '文件目录';
                    }
                } else if (fileType === 'code') {
                    fileList.style.display = '';
                    tocPanel.style.display = 'none';
                    titleText.textContent = '文件目录';
                    const lang = getCodeLanguage(file.path);
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <pre><code>${highlightCode(content, lang)}</code></pre>
                    `;
                } else {
                    fileList.style.display = '';
                    tocPanel.style.display = 'none';
                    titleText.textContent = '文件目录';
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <pre>${escapeHtml(content)}</pre>
                    `;
                }
            } catch (e) {
                container.innerHTML += `<div class="error">错误: ${escapeHtml(e.message)}</div>`;
            }
        }

        // 恢复文件目录显示
        function restoreFileList() {
            document.getElementById('file-list').style.display = '';
            document.getElementById('toc-panel').style.display = 'none';
            document.getElementById('sidebar-title-text').textContent = '文件目录';
        }

        // 滚动到指定标题
        let scrollSpyObserver = null;
        function scrollToHeading(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                // 移动端关闭侧边栏
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            }
        }

        // 滚动监听，高亮当前 TOC 项
        function setupScrollSpy() {
            if (scrollSpyObserver) scrollSpyObserver.disconnect();
            const tocItems = document.querySelectorAll('.toc-item[data-id]');
            if (!tocItems.length) return;

            const headingIds = Array.from(tocItems).map(el => el.dataset.id);
            const headings = headingIds.map(id => document.getElementById(id)).filter(Boolean);
            if (!headings.length) return;

            scrollSpyObserver = new IntersectionObserver(entries => {
                // 找到第一个可见的标题
                let activeId = null;
                for (const h of headings) {
                    const rect = h.getBoundingClientRect();
                    if (rect.top <= 40) {
                        activeId = h.id;
                    }
                }
                tocItems.forEach(el => {
                    el.classList.toggle('active', el.dataset.id === activeId);
                });
            }, { rootMargin: '-10px 0px -80% 0px', threshold: 0 });

            headings.forEach(h => scrollSpyObserver.observe(h));
        }

        // 防抖处理，避免重复点击
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 优化点击事件 - 使用 window.showFile 以支持移动端包装
        const debouncedShowFile = debounce((...args) => window.showFile(...args), 200);

        // 监听窗口大小变化，适配不同的屏幕尺寸
        window.addEventListener('resize', debounce(function() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth > 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                document.querySelector('.menu-overlay').classList.remove('show');
                document.body.style.overflow = '';
            }
        }, 250));

        // 初始化 - 动态加载文件列表
        (async function init() {
            const container = document.getElementById('file-content');
            container.innerHTML = '<div class="loading">正在加载文件列表...</div>';
            try {
                FILES = await fetchAllFiles();
                renderFileList();
                if (FILES.length > 0) {
                    debouncedShowFile(0);
                } else {
                    container.innerHTML = '<div class="loading">仓库中没有找到文件</div>';
                }
            } catch (e) {
                container.innerHTML = `<div class="error">加载文件列表失败: ${e.message}</div>`;
            }
        })();
    </script>
</body>
