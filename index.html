<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 允许文本内容被选择 */
        .markdown-body {
            -webkit-user-select: text;
            user-select: text;
        }
        .header {
            background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: headerGradient 3s ease infinite;
        }
        @keyframes headerGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.8rem;
        }
        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #30363d;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        /* 设置按钮和面板 */
        .settings-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #30363d;
            border: none;
            color: #8b949e;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .settings-btn:hover { color: #c9d1d9; }
        .settings-panel {
            display: none;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 16px;
        }
        .settings-panel.show { display: block; }
        .settings-panel label { color: #c9d1d9; font-size: 13px; }
        .settings-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .settings-row input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .settings-row input:focus { border-color: #58a6ff; }
        .settings-row button {
            background: #238636;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .settings-row button:hover { background: #2ea043; }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        /* 左侧文件列表 */
        .sidebar {
            width: 250px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 16px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 100;
        }
        .sidebar-title {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
            padding: 0 8px;
        }

        /* 树形目录 */
        :root { --tree-indent: 16px; --tree-leaf-extra: 20px; }
        .tree-node { position: relative; }
        .tree-branch {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            cursor: pointer;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 13px;
            user-select: none;
            min-height: 32px;
        }
        .tree-branch:hover { background: #30363d; }
        .tree-arrow {
            color: #8b949e;
            font-size: 10px;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .tree-icon { flex-shrink: 0; font-size: 14px; }
        .tree-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-count {
            font-size: 11px;
            color: #8b949e;
            background: #21262d;
            padding: 0 6px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .tree-children { }
        .tree-children.collapsed { display: none; }
        .tree-leaf {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            min-height: 32px;
        }
        .tree-leaf:hover { background: #30363d; }
        .tree-leaf.active { background: #1f6feb; color: white; }
        .tree-leaf .tree-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* 右侧内容 */
        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .file-title {
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .loading { color: #8b949e; }
        .error { color: #f85149; }

        /* 代码样式 */
        pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            color: #e6edf3;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'SF Mono', Consolas, monospace;
        }
        code {
            font-family: 'SF Mono', Consolas, monospace;
        }

        /* Markdown 渲染样式 */
        .markdown-body {
            color: #c9d1d9;
            line-height: 1.8;
            font-size: 15px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .markdown-body > p {
            margin: 12px 0;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: #f0f6fc;
            margin: 28px 0 12px;
            font-weight: 600;
            line-height: 1.4;
        }
        .markdown-body h1 { font-size: 1.7em; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .markdown-body h2 { font-size: 1.4em; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
        .markdown-body h3 { font-size: 1.2em; }
        .markdown-body h4 { font-size: 1.05em; }
        .markdown-body > h1:first-child,
        .markdown-body > h2:first-child,
        .markdown-body > h3:first-child {
            margin-top: 0;
        }
        .markdown-body a {
            color: #58a6ff;
            text-decoration: none;
            word-break: break-all;
        }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol { margin: 10px 0; padding-left: 24px; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body li > ul, .markdown-body li > ol { margin: 4px 0; }
        .markdown-body blockquote {
            border-left: 4px solid #238636;
            padding: 10px 16px;
            margin: 14px 0;
            color: #8b949e;
            background: rgba(35, 134, 54, 0.1);
            border-radius: 0 6px 6px 0;
        }
        .markdown-body blockquote p { margin: 0; }
        .markdown-body table {
            border-collapse: collapse;
            margin: 14px 0;
            display: block;
            overflow-x: auto;
            max-width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #30363d;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: #161b22;
            color: #f0f6fc;
            font-weight: 600;
        }
        .markdown-body tr:nth-child(even) { background: rgba(22, 27, 34, 0.5); }
        .markdown-body hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 20px 0;
        }
        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
            margin: 10px 0;
        }
        .markdown-body strong { color: #f0f6fc; font-weight: 600; }
        .markdown-body em { color: #c9d1d9; }
        .markdown-body code {
            background: rgba(110, 118, 129, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'SF Mono', Consolas, monospace;
            word-break: break-all;
        }
        .markdown-body pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 14px;
            overflow-x: auto;
            margin: 14px 0;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
            word-break: normal;
        }

        /* 代码高亮 */
        .hljs-keyword { color: #ff7b72; }
        .hljs-string { color: #a5d6ff; }
        .hljs-number { color: #79c0ff; }
        .hljs-comment { color: #8b949e; font-style: italic; }
        .hljs-function { color: #d2a8ff; }
        .hljs-title { color: #d2a8ff; }
        .hljs-params { color: #e6edf3; }
        .hljs-built_in { color: #ffa657; }
        .hljs-literal { color: #79c0ff; }
        .hljs-type { color: #ffa657; }
        .hljs-attr { color: #79c0ff; }
        .hljs-selector-tag { color: #7ee787; }
        .hljs-selector-class { color: #d2a8ff; }
        .hljs-selector-id { color: #79c0ff; }

        /* 图片显示 */
        .image-viewer {
            text-align: center;
        }
        .image-viewer img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* 响应式 - 平板及以下 */
        @media (max-width: 768px) {
            :root { --tree-indent: 12px; --tree-leaf-extra: 14px; }
            .menu-toggle {
                display: block;
            }
            .header {
                padding: 0.8rem 0.8rem 0.8rem 3rem;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 101;
                height: 60px;
            }
            .container {
                flex-direction: column;
                padding-top: 60px; /* 给固定header留出空间 */
                min-height: 100vh;
            }
            .sidebar {
                position: fixed;
                top: 60px;
                left: 0;
                bottom: 0;
                width: 260px;
                transform: translateX(-100%);
                padding-top: 16px;
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-overlay.show {
                display: block;
            }
            .main {
                padding: 12px;
                margin-top: 0;
            }
            .markdown-body {
                font-size: 14px;
            }
            .markdown-body h1 { font-size: 1.4em; }
            .markdown-body h2 { font-size: 1.25em; }
            .markdown-body h3 { font-size: 1.1em; }
            pre {
                padding: 12px;
                font-size: 12px;
            }
            .markdown-body table {
                font-size: 12px;
                display: table;
                width: auto;
                min-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .markdown-body th, .markdown-body td {
                padding: 6px 8px;
                white-space: nowrap;
            }
            .tree-branch {
                font-size: 13px;
                padding: 6px 6px;
            }
            .tree-leaf {
                font-size: 13px;
                padding: 5px 6px;
                min-height: 36px;
            }
            .tree-label { font-size: 13px; }
        }

        /* 响应式 - 手机 */
        @media (max-width: 480px) {
            :root { --tree-indent: 8px; --tree-leaf-extra: 10px; }
            .header h1 {
                font-size: 1rem;
                margin-bottom: 0.2rem;
            }
            .header p {
                font-size: 0.7rem;
            }
            .menu-toggle {
                left: 0.5rem;
                padding: 6px 8px;
                font-size: 1rem;
            }
            .settings-btn {
                right: 0.5rem;
                padding: 6px 8px;
                font-size: 1rem;
            }
            .header {
                padding: 0.6rem 0.6rem 0.6rem 2.5rem;
                height: 55px;
            }
            .container {
                padding-top: 55px;
            }
            .sidebar {
                top: 55px;
                width: 85%;
                max-width: 280px;
            }
            .main {
                padding: 8px;
            }
            .file-title {
                font-size: 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                margin-bottom: 8px;
            }
            .markdown-body {
                font-size: 14px;
                line-height: 1.6;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }
            .markdown-body > p {
                margin: 10px 0;
                word-break: break-word;
            }
            .markdown-body h1, .markdown-body h2, .markdown-body h3 {
                margin: 16px 0 8px;
                word-break: break-word;
            }
            .markdown-body h1 {
                font-size: 1.3em;
                line-height: 1.3;
            }
            .markdown-body h2 {
                font-size: 1.2em;
                line-height: 1.3;
            }
            .markdown-body h3 {
                font-size: 1.1em;
                line-height: 1.3;
            }
            .markdown-body ul, .markdown-body ol {
                padding-left: 16px;
                margin: 8px 0;
            }
            .markdown-body li {
                margin: 4px 0;
            }
            .markdown-body blockquote {
                padding: 6px 10px;
                margin: 12px 0;
            }
            .markdown-body code {
                font-size: 0.85em;
                word-break: break-all;
            }
            pre {
                padding: 8px;
                font-size: 11px;
                border-radius: 4px;
                overflow-x: auto;
            }
            .tree-branch {
                font-size: 12px;
                padding: 5px 6px;
            }
            .tree-leaf {
                font-size: 12px;
                padding: 4px 4px;
                min-height: 36px;
            }
            .tree-leaf .tree-label {
                word-break: break-all;
            }
            .markdown-body table {
                font-size: 11px;
            }
            .markdown-body th, .markdown-body td {
                padding: 4px 6px;
                word-break: break-word;
            }
        }

        /* 响应式 - 极小的手机屏幕 */
        @media (max-width: 360px) {
            :root { --tree-indent: 6px; --tree-leaf-extra: 8px; }
            .header h1 {
                font-size: 0.9rem;
            }
            .header p {
                font-size: 0.65rem;
            }
            .markdown-body {
                font-size: 13px;
            }
            .markdown-body h1 { font-size: 1.2em; }
            .markdown-body h2 { font-size: 1.1em; }
            .markdown-body h3 { font-size: 1em; }
            pre {
                font-size: 10px;
                padding: 6px;
            }
            .tree-branch {
                font-size: 12px;
                padding: 5px 4px;
            }
            .tree-leaf {
                font-size: 12px;
                padding: 4px 4px;
                min-height: 32px;
            }
            .tree-label { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1>📝 我的笔记</h1>
        <p>记录思考，分享生活</p>
        <button class="settings-btn" onclick="toggleSettings()" title="设置 Token">⚙</button>
    </div>
    <div class="menu-overlay" onclick="toggleSidebar()"></div>
    <div class="settings-panel" id="settings-panel">
        <label>GitHub Token <span style="opacity:0.5">(解决 API 限流)</span></label>
        <div class="settings-row">
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="saveToken()">保存</button>
        </div>
        <div id="token-status" style="font-size:12px;margin-top:6px;opacity:0.7"></div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">文件目录</div>
            <div id="file-list"></div>
        </div>
        <div class="main">
            <div id="file-content"></div>
        </div>
    </div>

    <script>
        // 配置仓库信息
        const REPO = 'ysg1011/ysg1011.github.io';
        const BRANCH = 'main';

        // 需要排除的文件/目录
        const EXCLUDE_PATTERNS = [
            'index.html', 'README.md', 'LICENSE',
            '.git', '.github', 'CNAME', '_config.yml', 'Gemfile',
            'images'
        ];

        let FILES = [];
        const icons = ['📄', '📝', '📋', '📑', '📃', '🗎'];

        // GitHub Token 管理
        function getToken() { return localStorage.getItem('gh_token') || ''; }
        function setToken(t) { localStorage.setItem('gh_token', t); }

        function ghHeaders() {
            const h = { 'Accept': 'application/vnd.github.v3+json' };
            const t = getToken();
            if (t) h['Authorization'] = 'token ' + t;
            return h;
        }

        // 判断是否为排除项
        function isExcluded(path) {
            return EXCLUDE_PATTERNS.some(ex =>
                path === ex || path.startsWith(ex + '/')
            );
        }

        // 方案1: 用 Trees API 获取全部文件（需 token 解决限流）
        async function fetchViaTreesAPI() {
            const url = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;
            const res = await fetch(url, { headers: ghHeaders() });
            if (!res.ok) throw new Error('Trees API 失败: ' + res.status);
            const data = await res.json();
            return data.tree
                .filter(item => item.type === 'blob' && !isExcluded(item.path))
                .map(item => ({ repo: REPO, path: item.path }));
        }

        // 方案2: 递归 Contents API（每层单独请求）
        async function fetchViaContentsAPI(path) {
            const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
            const res = await fetch(url, { headers: ghHeaders() });
            if (!res.ok) throw new Error('Contents API 失败: ' + res.status);
            const items = await res.json();
            let files = [];
            for (const item of items) {
                if (isExcluded(item.path)) continue;
                if (item.type === 'file') {
                    files.push({ repo: REPO, path: item.path });
                } else if (item.type === 'dir') {
                    const sub = await fetchViaContentsAPI(item.path);
                    files = files.concat(sub);
                }
            }
            return files;
        }

        // 主获取函数：先 Trees API，失败回退 Contents API
        async function fetchAllFiles() {
            try {
                return await fetchViaTreesAPI();
            } catch (e) {
                console.warn('Trees API 失败，回退到 Contents API:', e);
                return await fetchViaContentsAPI('');
            }
        }

        // 获取文件类型
        function getFileType(path) {
            const ext = path.split('.').pop().toLowerCase();
            const name = path.toLowerCase();

            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'].includes(ext)) return 'image';
            if (ext === 'md') return 'markdown';
            if (['c', 'h', 'cpp', 'hpp', 'py', 'js', 'ts', 'go', 'rs', 'java', 'kt', 'sh', 'bash', 'makefile', 'mk'].includes(ext)) return 'code';
            return 'text';
        }

        // 获取代码语言
        function getCodeLanguage(path) {
            const ext = path.split('.').pop().toLowerCase();
            const map = {
                'c': 'c', 'h': 'c', 'cpp': 'cpp', 'hpp': 'cpp',
                'py': 'python', 'js': 'javascript', 'ts': 'typescript',
                'go': 'go', 'rs': 'rust', 'java': 'java', 'kt': 'kotlin',
                'sh': 'bash', 'bash': 'bash', 'makefile': 'makefile', 'mk': 'makefile'
            };
            return map[ext] || 'text';
        }

        // 简单 Markdown 转 HTML
        function parseMarkdown(text) {
            const lines = text.split('\n');
            let html = '';
            let inCodeBlock = false;
            let inTable = false;
            let inList = false;
            let inBlockquote = false;
            let codeBlockContent = '';
            let codeBlockLang = '';
            let tableRows = [];
            let listItems = [];
            let blockquoteContent = [];
            let i = 0;

            while (i < lines.length) {
                const line = lines[i];
                const trimmed = line.trim();

                // 代码块开始
                if (trimmed.startsWith('```')) {
                    if (!inCodeBlock) {
                        inCodeBlock = true;
                        codeBlockLang = trimmed.slice(3).trim();
                        codeBlockContent = '';
                    } else {
                        // 代码块结束
                        inCodeBlock = false;
                        html += `<pre><code class="language-${codeBlockLang}">${escapeHtml(codeBlockContent)}</code></pre>`;
                    }
                    i++;
                    continue;
                }

                if (inCodeBlock) {
                    codeBlockContent += (codeBlockContent ? '\n' : '') + line;
                    i++;
                    continue;
                }

                // 引用块
                if (trimmed.startsWith('>')) {
                    blockquoteContent.push(trimmed.slice(1).trim());
                    inBlockquote = true;
                    i++;
                    continue;
                } else if (inBlockquote) {
                    html += `<blockquote>${blockquoteContent.join('<br>')}</blockquote>`;
                    blockquoteContent = [];
                    inBlockquote = false;
                    continue;
                }

                // 表格
                if (trimmed.startsWith('|') && !trimmed.includes('---')) {
                    if (!inTable) {
                        inTable = true;
                        tableRows = [];
                    }
                    const cells = trimmed.split('|').filter(c => c.trim());
                    tableRows.push(cells.map(c => c.trim()));
                    i++;
                    continue;
                } else if (trimmed.includes('---') && trimmed.includes('|')) {
                    // 表格分隔行，跳过
                    i++;
                    continue;
                } else if (inTable) {
                    // 表格结束，生成 HTML
                    if (tableRows.length > 0) {
                        html += '<table><thead><tr>';
                        tableRows[0].forEach(h => html += `<th>${h}</th>`);
                        html += '</tr></thead><tbody>';
                        for (let j = 1; j < tableRows.length; j++) {
                            html += '<tr>';
                            tableRows[j].forEach(c => html += `<td>${c}</td>`);
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                    }
                    tableRows = [];
                    inTable = false;
                    continue;
                }

                // 无序列表
                if (trimmed.startsWith('- ')) {
                    if (!inList) {
                        inList = true;
                        listItems = [];
                    }
                    listItems.push(trimmed.slice(2));
                    i++;
                    continue;
                }
                // 有序列表
                else if (/^\d+\.\s/.test(trimmed)) {
                    if (!inList) {
                        inList = true;
                        listItems = [];
                    }
                    listItems.push(trimmed.replace(/^\d+\.\s/, ''));
                    i++;
                    continue;
                }
                else if (inList) {
                    // 列表结束
                    html += '<ul>' + listItems.map(item => `<li>${item}</li>`).join('') + '</ul>';
                    listItems = [];
                    inList = false;
                    continue;
                }

                // 水平线
                if (/^---+$/.test(trimmed)) {
                    html += '<hr>';
                    i++;
                    continue;
                }

                // 标题
                if (trimmed.startsWith('### ')) {
                    html += `<h3>${escapeHtml(trimmed.slice(4))}</h3>`;
                } else if (trimmed.startsWith('## ')) {
                    html += `<h2>${escapeHtml(trimmed.slice(3))}</h2>`;
                } else if (trimmed.startsWith('# ')) {
                    html += `<h1>${escapeHtml(trimmed.slice(2))}</h1>`;
                } else if (trimmed) {
                    // 普通段落 - 处理行内格式
                    let p = line
                        .replace(/`([^`]+)`/g, '<code>$1</code>')
                        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

                    if (p.trim()) {
                        html += `<p>${p}</p>`;
                    }
                }

                i++;
            }

            // 处理剩余内容
            if (inTable && tableRows.length > 0) {
                html += '<table><thead><tr>';
                tableRows[0].forEach(h => html += `<th>${h}</th>`);
                html += '</tr></thead><tbody>';
                for (let j = 1; j < tableRows.length; j++) {
                    html += '<tr>';
                    tableRows[j].forEach(c => html += `<td>${c}</td>`);
                    html += '</tr>';
                }
                html += '</tbody></table>';
            }

            if (inList && listItems.length > 0) {
                html += '<ul>' + listItems.map(item => `<li>${item}</li>`).join('') + '</ul>';
            }

            if (inBlockquote && blockquoteContent.length > 0) {
                html += `<blockquote>${blockquoteContent.join('<br>')}</blockquote>`;
            }

            return `<div class="markdown-body">${html}</div>`;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        // 简单语法高亮
        function highlightCode(code, language) {
            const keywords = {
                c: ['int', 'void', 'char', 'float', 'double', 'if', 'else', 'for', 'while', 'return', 'struct', 'enum', 'typedef', 'static', 'const', 'unsigned', 'long', 'short', 'case', 'switch', 'break', 'continue', 'default', 'do', 'goto', 'sizeof', 'union', 'volatile', 'extern', 'register', 'signed'],
                python: ['def', 'class', 'if', 'elif', 'else', 'for', 'while', 'return', 'import', 'from', 'as', 'try', 'except', 'finally', 'with', 'pass', 'break', 'continue', 'lambda', 'yield', 'global', 'nonlocal', 'raise', 'assert', 'del', 'in', 'is', 'not', 'and', 'or', 'True', 'False', 'None'],
                javascript: ['function', 'var', 'let', 'const', 'if', 'else', 'for', 'while', 'return', 'class', 'extends', 'new', 'this', 'import', 'export', 'default', 'try', 'catch', 'finally', 'throw', 'async', 'await', 'true', 'false', 'null', 'undefined'],
                go: ['func', 'package', 'import', 'var', 'const', 'type', 'struct', 'interface', 'if', 'else', 'for', 'range', 'return', 'go', 'chan', 'select', 'defer', 'true', 'false', 'nil'],
                rust: ['fn', 'let', 'mut', 'const', 'static', 'if', 'else', 'match', 'for', 'while', 'loop', 'return', 'struct', 'enum', 'impl', 'trait', 'pub', 'use', 'mod', 'crate', 'self', 'super', 'true', 'false'],
                bash: ['if', 'then', 'else', 'elif', 'fi', 'for', 'do', 'done', 'while', 'case', 'esac', 'function', 'return', 'echo', 'export', 'source', 'cd', 'ls', 'mkdir', 'rm', 'cp', 'mv', 'cat', 'grep', 'sed', 'awk']
            };

            let highlighted = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 字符串
            highlighted = highlighted.replace(/(["'`])(?:(?!\1)[^\\]|\\.)*\1/g, '<span class="hljs-string">$&</span>');

            // 注释
            highlighted = highlighted.replace(/(\/\/.*$)/gm, '<span class="hljs-comment">$1</span>');
            highlighted = highlighted.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hljs-comment">$1</span>');
            highlighted = highlighted.replace(/(#.*$)/gm, '<span class="hljs-comment">$1</span>');

            // 数字
            highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, '<span class="hljs-number">$1</span>');

            // 关键字
            if (keywords[language]) {
                const kw = keywords[language].join('|');
                highlighted = highlighted.replace(new RegExp(`\\b(${kw})\\b`, 'g'), '<span class="hljs-keyword">$1</span>');
            }

            return highlighted;
        }

        // 构建目录树结构
        function buildTree(files) {
            const root = { folders: {}, files: [] };
            for (const file of files) {
                const parts = file.path.split('/');
                let node = root;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!node.folders[parts[i]]) {
                        node.folders[parts[i]] = { folders: {}, files: [] };
                    }
                    node = node.folders[parts[i]];
                }
                node.files.push({ name: parts[parts.length - 1], file });
            }
            return root;
        }

        // 统计目录下的文件总数
        function countFiles(node) {
            let n = node.files.length;
            for (const k of Object.keys(node.folders)) {
                n += countFiles(node.folders[k]);
            }
            return n;
        }

        // 递归渲染目录树节点
        function renderTreeNode(node, depth) {
            let html = '';
            const indent = depth;

            // 渲染子目录
            const folderNames = Object.keys(node.folders).sort();
            for (const name of folderNames) {
                const child = node.folders[name];
                const cnt = countFiles(child);
                html += `<div class="tree-node" style="padding-left:calc(${indent} * var(--tree-indent))">`;
                html += `<div class="tree-branch" onclick="toggleFolder(this)">`;
                html += `<span class="tree-arrow">▶</span>`;
                html += `<span class="tree-icon"> </span>`;
                html += `<span class="tree-label">${name}</span>`;
                html += `<span class="tree-count">${cnt}</span>`;
                html += `</div>`;
                html += `<div class="tree-children collapsed">`;
                html += renderTreeNode(child, depth + 1);
                html += `</div></div>`;
            }

            // 渲染文件
            for (const { name, file } of node.files) {
                const icon = getFileIcon(name);
                const idx = FILES.indexOf(file);
                html += `<div class="tree-leaf" style="padding-left:calc(${indent} * var(--tree-indent) + var(--tree-leaf-extra))" data-index="${idx}">`;
                html += `<span class="tree-icon">${icon}</span>`;
                html += `<span class="tree-label">${name}</span>`;
                html += `</div>`;
            }

            return html;
        }

        // 根据文件名获取图标
        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            if (ext === 'md') return '📝';
            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'].includes(ext)) return '🖼';
            if (['c', 'h', 'cpp', 'hpp', 'py', 'js', 'ts', 'go', 'rs', 'java', 'kt'].includes(ext)) return '💻';
            if (['sh', 'bash'].includes(ext)) return '⚙';
            return '📄';
        }

        // 渲染左侧文件列表
        function renderFileList() {
            const list = document.getElementById('file-list');
            const tree = buildTree(FILES);

            list.innerHTML = renderTreeNode(tree, 0);

            // 绑定文件点击事件
            list.querySelectorAll('.tree-leaf').forEach(el => {
                el.addEventListener('click', function() {
                    debouncedShowFile(parseInt(this.dataset.index));
                });
            });
        }

        function toggleFolder(el) {
            const children = el.nextElementSibling;
            const arrow = el.querySelector('.tree-arrow');
            children.classList.toggle('collapsed');
            arrow.textContent = children.classList.contains('collapsed') ? '▶' : '▼';
        }

        // 设置面板
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('show');
        }
        function saveToken() {
            const t = document.getElementById('token-input').value.trim();
            setToken(t);
            const s = document.getElementById('token-status');
            s.textContent = t ? 'Token 已保存，刷新页面生效' : 'Token 已清除';
            setTimeout(() => { s.textContent = ''; }, 3000);
        }
        // 初始化 token 输入框
        if (getToken()) {
            document.getElementById('token-input').value = getToken();
        }

        // 移动端侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.menu-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');

            // 阻止body滚动
            if (sidebar.classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        // 点击文件后自动关闭侧边栏（移动端）- 包装 showFile
        const originalShowFile = showFile;
        window.showFile = async function(index) {
            await originalShowFile(index);
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        };

        // 触摸滑动关闭侧边栏
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            const sidebar = document.getElementById('sidebar');

            // 如果侧边栏打开且用户向右滑动超过50px，关闭侧边栏
            if (sidebar.classList.contains('open') && touchEndX - touchStartX > 50) {
                toggleSidebar();
            }
        });

        // 点击遮罩层关闭侧边栏
        document.querySelector('.menu-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                toggleSidebar();
            }
        });

        // 点击侧边栏空白区域关闭侧边栏
        document.getElementById('sidebar').addEventListener('click', function(e) {
            if (e.target === this || e.target === document.getElementById('file-list')) {
                toggleSidebar();
            }
        });

        // 点击正文区域关闭侧边栏
        document.querySelector('.main').addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                toggleSidebar();
            }
        });

        // 显示指定文件
        async function showFile(index) {
            // 更新选中状态
            document.querySelectorAll('.tree-leaf').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.index) === index);
            });

            const file = FILES[index];
            const container = document.getElementById('file-content');
            const icon = icons[index % icons.length];
            const fileType = getFileType(file.path);

            container.innerHTML = `
                <div class="file-title">
                    <span class="file-icon">${icon}</span>
                    ${file.path}
                </div>
                <div class="loading">加载中...</div>
            `;

            try {
                const url = `https://raw.githubusercontent.com/${file.repo}/main/${file.path}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('文件不存在');

                const content = await res.text();

                if (fileType === 'image') {
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <div class="image-viewer">
                            <img src="${url}" alt="${file.path}" onerror="this.parentElement.innerHTML='<p class=error>图片加载失败</p>'">
                        </div>
                    `;
                } else if (fileType === 'markdown') {
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        ${parseMarkdown(content)}
                    `;
                } else if (fileType === 'code') {
                    const lang = getCodeLanguage(file.path);
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <pre><code>${highlightCode(content, lang)}</code></pre>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="file-title">
                            <span class="file-icon">${icon}</span>
                            ${file.path}
                        </div>
                        <pre>${content}</pre>
                    `;
                }
            } catch (e) {
                container.innerHTML += `<div class="error">错误: ${e.message}</div>`;
            }
        }

        // 防抖处理，避免重复点击
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 优化点击事件 - 使用 window.showFile 以支持移动端包装
        const debouncedShowFile = debounce((...args) => window.showFile(...args), 200);

        // 监听窗口大小变化，适配不同的屏幕尺寸
        window.addEventListener('resize', debounce(function() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth > 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                document.querySelector('.menu-overlay').classList.remove('show');
                document.body.style.overflow = '';
            }
        }, 250));

        // 初始化 - 动态加载文件列表
        (async function init() {
            const container = document.getElementById('file-content');
            container.innerHTML = '<div class="loading">正在加载文件列表...</div>';
            try {
                FILES = await fetchAllFiles();
                renderFileList();
                if (FILES.length > 0) {
                    debouncedShowFile(0);
                } else {
                    container.innerHTML = '<div class="loading">仓库中没有找到文件</div>';
                }
            } catch (e) {
                container.innerHTML = `<div class="error">加载文件列表失败: ${e.message}</div>`;
            }
        })();
    </script>
</body>
</html>
