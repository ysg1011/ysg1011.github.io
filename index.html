<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        /* 左侧文件列表 */
        .sidebar {
            width: 200px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 16px;
            flex-shrink: 0;
        }
        .sidebar-title {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .file-link {
            display: block;
            padding: 8px 12px;
            color: #c9d1d9;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .file-link:hover {
            background: #30363d;
        }
        .file-link.active {
            background: #1f6feb;
            color: white;
        }
        /* 右侧内容 */
        .main {
            flex: 1;
            padding: 20px 40px;
        }
        .content-wrapper {
            max-width: 100%;
            width: 100%;
        }
        .file-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }
        .file-title {
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-icon {
            font-size: 18px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: white;
            font-size: 13px;
            line-height: 1.6;
        }
        .loading { color: #8b949e; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 我的笔记</h1>
        <p>记录思考，分享生活</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">文件目录</div>
            <div id="file-list"></div>
        </div>
        <div class="main">
            <div class="content-wrapper">
                <div id="file-content"></div>
            </div>
        </div>
    </div>

    <script>
        // 配置要显示的文件列表
        const FILES = [
            { repo: 'ysg1011/ysg1011.github.io', path: 'android/android_boot' },
            { repo: 'ysg1011/ysg1011.github.io', path: 'android/Android_Init_Language.md' }
        ];

        const icons = ['📄', '📝', '📋', '📑', '📃', '🗎'];

        // 渲染左侧文件列表
        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = FILES.map((file, i) => {
                const icon = icons[i % icons.length];
                const name = file.path.split('/').pop();
                return `<div class="file-link ${i === 0 ? 'active' : ''}" onclick="showFile(${i})">${icon} ${name}</div>`;
            }).join('');
        }

        // 显示指定文件
        async function showFile(index) {
            // 更新左侧选中状态
            document.querySelectorAll('.file-link').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            const file = FILES[index];
            const container = document.getElementById('file-content');
            const icon = icons[index % icons.length];

            container.innerHTML = `
                <div class="file-item">
                    <div class="file-title">
                        <span class="file-icon">${icon}</span>
                        ${file.repo}/${file.path}
                    </div>
                    <pre class="loading">加载中...</pre>
                </div>
            `;

            try {
                const url = `https://raw.githubusercontent.com/${file.repo}/main/${file.path}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('文件不存在');
                const content = await res.text();
                container.querySelector('pre').textContent = content;
                container.querySelector('pre').classList.remove('loading');
            } catch (e) {
                container.querySelector('pre').textContent = '错误: ' + e.message;
                container.querySelector('pre').className = 'error';
            }
        }

        // 初始化
        renderFileList();
        showFile(0);
    </script>
</body>
</html>
